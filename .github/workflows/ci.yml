name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint web
        run: pnpm lint:web

      - name: Test web (placeholder)
        run: pnpm test:web

      - name: Prisma validate (placeholder)
        run: make prisma-validate

  api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint api
        run: make api-lint

      - name: Test api (placeholder)
        run: make api-test
